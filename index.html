<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实验测试</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="./script.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>实验测试</h1>

    <p>剩余时间：<span id="timer">--</span> 秒</p>

    <div class="card">
      <h2>题目</h2>
      <div id="question"></div>
    </div>

    <div class="card">
      <h2>AI 回答</h2>
      <div id="ai-answer-text"></div>
      <br />
      <button id="source-btn">查看补充资料</button>
      <div id="source-box" style="display: none; margin-top: 16px;"></div>
    </div>

    <div class="card">
      <h2>你的答案</h2>
      <button id="btnA">A</button>
      <button id="btnB">B</button>
    </div>

    <div id="status"></div>
  </div>
</body>
</html>
