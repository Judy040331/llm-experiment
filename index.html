<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>预实验二</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./script.js" defer></script>
</head>
<body>
  <div class="container">
    <div id="experiment-screen">
      <h1>实验测试</h1>

      <div class="top-bar">
        <p>当前题目：第 <span id="progress">1</span> / <span id="total-count">4</span> 题</p>
        <p>剩余时间：<span id="timer">--</span> 秒</p>
      </div>

      <div id="question-screen">
        <div class="card">
          <h2>题目</h2>
          <div id="question"></div>
        </div>

        <div class="card">
          <h2>AI 回答</h2>
          <div id="ai-thinking" class="thinking-text" style="display: none;">AI 正在思考...</div>
          <div id="ai-answer-text"></div>
        </div>

        <div class="card action-card">
          <button id="source-btn">查看补充资料</button>
          <button id="go-answer-btn">进入作答</button>
        </div>
      </div>

      <div id="answer-screen" style="display: none;">
        <div class="card">
          <h2>你的答案</h2>

          <div class="option-row">
            <button id="btnA">A</button>
            <span id="optionA" class="option-text"></span>
          </div>

          <div class="option-row">
            <button id="btnB">B</button>
            <span id="optionB" class="option-text"></span>
          </div>
        </div>
      </div>

      <div id="status"></div>

      <div id="source-modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
          <div class="modal-header">
            <h2 id="modal-title">补充资料</h2>
            <div class="modal-timer">剩余时间：<span id="modal-timer">--</span> 秒</div>
          </div>

          <div id="source-text" class="modal-body"></div>
          <p id="source-label" class="source-label"></p>

          <div class="modal-actions">
            <button id="close-source-modal-btn">关闭并作答</button>
          </div>
        </div>
      </div>
    </div>

    <div id="check-screen" style="display: none; margin-top: 32px;">
      <div class="card">
        <h2>问卷反馈</h2>
        <p>请根据刚才整组题目的作答体验进行评价。</p>

        <div class="rating-block">
          <p>1. 刚才作答时，我感到时间很紧。</p>
          <label><input type="radio" name="time-pressure" value="1"> 1</label>
          <label><input type="radio" name="time-pressure" value="2"> 2</label>
          <label><input type="radio" name="time-pressure" value="3"> 3</label>
          <label><input type="radio" name="time-pressure" value="4"> 4</label>
          <label><input type="radio" name="time-pressure" value="5"> 5</label>
          <label><input type="radio" name="time-pressure" value="6"> 6</label>
          <label><input type="radio" name="time-pressure" value="7"> 7</label>
        </div>

        <div class="rating-block">
          <p>2. 刚才作答时，我觉得自己是在被催着做决定。</p>
          <label><input type="radio" name="time-pressure-2" value="1"> 1</label>
          <label><input type="radio" name="time-pressure-2" value="2"> 2</label>
          <label><input type="radio" name="time-pressure-2" value="3"> 3</label>
          <label><input type="radio" name="time-pressure-2" value="4"> 4</label>
          <label><input type="radio" name="time-pressure-2" value="5"> 5</label>
          <label><input type="radio" name="time-pressure-2" value="6"> 6</label>
          <label><input type="radio" name="time-pressure-2" value="7"> 7</label>
        </div>

        <div class="rating-block">
          <p>3. 刚才这个 LLM 回答看起来很有把握。</p>
          <label><input type="radio" name="llm-confidence" value="1"> 1</label>
          <label><input type="radio" name="llm-confidence" value="2"> 2</label>
          <label><input type="radio" name="llm-confidence" value="3"> 3</label>
          <label><input type="radio" name="llm-confidence" value="4"> 4</label>
          <label><input type="radio" name="llm-confidence" value="5"> 5</label>
          <label><input type="radio" name="llm-confidence" value="6"> 6</label>
          <label><input type="radio" name="llm-confidence" value="7"> 7</label>
        </div>

        <div class="rating-block">
          <p>4. 刚才这个 LLM 回答看起来可信。</p>
          <label><input type="radio" name="llm-credible" value="1"> 1</label>
          <label><input type="radio" name="llm-credible" value="2"> 2</label>
          <label><input type="radio" name="llm-credible" value="3"> 3</label>
          <label><input type="radio" name="llm-credible" value="4"> 4</label>
          <label><input type="radio" name="llm-credible" value="5"> 5</label>
          <label><input type="radio" name="llm-credible" value="6"> 6</label>
          <label><input type="radio" name="llm-credible" value="7"> 7</label>
        </div>

        <div class="rating-block">
          <p>5. 刚才这个 LLM 回答看起来可靠。</p>
          <label><input type="radio" name="llm-reliable" value="1"> 1</label>
          <label><input type="radio" name="llm-reliable" value="2"> 2</label>
          <label><input type="radio" name="llm-reliable" value="3"> 3</label>
          <label><input type="radio" name="llm-reliable" value="4"> 4</label>
          <label><input type="radio" name="llm-reliable" value="5"> 5</label>
          <label><input type="radio" name="llm-reliable" value="6"> 6</label>
          <label><input type="radio" name="llm-reliable" value="7"> 7</label>
        </div>

        <div style="margin-top: 28px;">
          <button id="submit-check">提交反馈</button>
        </div>

        <div id="check-status" style="margin-top: 20px;"></div>
      </div>
    </div>
  </div>
</body>
</html>
